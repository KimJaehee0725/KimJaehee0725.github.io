title: "Jaehee Kim"
name: "Jaehee Kim"
email: "jaehee_kim@snu.ac.kr"
description: >-
  Ph.D. student in Industrial Engineering at Seoul National University studying how language models reason, retrieve, and operate over time.
url: "https://kimjaehee0725.github.io"
baseurl: ""

remote_theme: "mmistakes/minimal-mistakes@4.26.1"
minimal_mistakes_skin: "contrast"

locale: "en"

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-include-cache

include:
  - _pages

collections:
  posts:
    output: true

permalink: /:categories/:title/

author:
  name: "Jaehee Kim"
  avatar: "/assets/images/profile/jaehee-kim-profile.jpg"
  avatar_secondary: "/assets/images/profile/hoyang.jpg"
  bio: |-
    Ph.D. student studying how language models reason, retrieve, and operate over time.

    Open to research internships. I share my desk with two cats, Luce and hoyang.
  location: "Seoul, Korea"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:jaehee_kim@snu.ac.kr"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/KimJaehee0725"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/jaehee-kim-hoyang"
    - label: "Google Scholar"
      icon: "ai ai-google-scholar"
      url: "https://scholar.google.com/citations?user=Iwp52qoAAAAJ&hl=ko&oi=sra"

footer:
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:jaehee_kim@snu.ac.kr"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/KimJaehee0725"

# Navigation
include_nav: true

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: "posts"
    values:
      layout: single
      author_profile: true

paginate: 5
paginate_path: "/blog/page:num/"

sass:
  style: compressed
